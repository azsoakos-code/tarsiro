<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Társíró — AI Történetíró</title>
  <meta name="theme-color" content="#d4a843">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Társíró">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg:       #0e0b07;
      --s1:       #141008;
      --s2:       #1b1510;
      --s3:       #221b14;
      --border:   #2e2318;
      --border2:  #3d3020;
      --gold:     #d4a843;
      --gold-dim: #8a6828;
      --text:     #ecdcb0;
      --dim:      #a08858;
      --muted:    #604e34;
      --ai-bg:    #100e0a;
      --usr-bg:   #161210;
      --red:      #8b2a2a;
      --redt:     #e07070;
      --green:    #1e5c2e;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--s1); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* ── Layout ── */
    .app { height: 100vh; display: flex; flex-direction: column; }
    .header {
      height: 50px; flex-shrink: 0;
      display: flex; align-items: center; gap: 20px; padding: 0 18px;
      background: var(--s1); border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: 'Cinzel', serif; font-size: 17px;
      color: var(--gold); letter-spacing: .14em; white-space: nowrap;
    }
    .logo em { font-style: normal; font-size: 10px; color: var(--muted); letter-spacing: .2em; margin-left: 8px; }
    .tabs { display: flex; gap: 2px; }
    .tab {
      padding: 5px 15px; border-radius: 4px; font-size: 12px;
      letter-spacing: .08em; color: var(--dim); border: 1px solid transparent;
      background: none; cursor: pointer; transition: all .13s; outline: none;
    }
    .tab:hover { color: var(--text); background: var(--s2); }
    .tab.active { color: var(--gold); background: var(--s2); border-color: var(--border); }
    .hdr-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .content { flex: 1; overflow: hidden; min-height: 0; }
    .status {
      height: 24px; flex-shrink: 0; padding: 0 16px;
      display: flex; align-items: center; gap: 16px;
      background: var(--s1); border-top: 1px solid var(--border);
      font-size: 10px; color: var(--muted); letter-spacing: .06em;
    }
    .status-dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; margin-right: 5px; }

    /* ── Buttons ── */
    .btn {
      padding: 5px 13px; border-radius: 4px; font-size: 11px;
      letter-spacing: .06em; cursor: pointer; border: 1px solid;
      transition: all .13s; outline: none; font-family: inherit;
    }
    .btn-gold { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }
    .btn-gold:hover { background: var(--gold); color: var(--bg); }
    .btn-ghost { background: transparent; border-color: var(--border); color: var(--dim); }
    .btn-ghost:hover { border-color: var(--border2); color: var(--text); }
    .btn-danger { background: transparent; border-color: var(--red); color: var(--redt); }
    .btn-danger:hover { background: var(--red); }
    .btn:disabled { opacity: .35; cursor: not-allowed; }

    /* ── Editor Tab ── */
    .editor-tab { height: 100%; display: flex; }
    .story-panel { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); min-width: 0; }
    .panel-hdr {
      height: 38px; flex-shrink: 0; padding: 0 16px;
      display: flex; align-items: center; gap: 10px;
      background: var(--s1); border-bottom: 1px solid var(--border);
    }
    .ph-label { font-size: 10px; letter-spacing: .14em; color: var(--muted); text-transform: uppercase; }
    .story-area {
      flex: 1; background: #1c1710; border: none; outline: none;
      resize: none; padding: 28px 36px;
      font-family: 'IM Fell English', Georgia, serif;
      font-size: 17px; line-height: 2; color: var(--text);
      overflow-y: auto;
    }
    .story-area::placeholder { color: var(--muted); font-style: italic; }

    /* ── Unified Editor ── */
    .editor-unified { height: 100%; display: flex; flex-direction: column; }
    .story-wrap { flex: 1; display: flex; flex-direction: column; min-height: 0; }

    .ai-response-panel {
      max-height: 240px; border-top: 2px solid var(--border2);
      background: var(--ai-bg); display: flex; flex-direction: column; flex-shrink: 0;
      transition: max-height .2s;
    }
    .ai-resp-hdr {
      height: 32px; padding: 0 14px; flex-shrink: 0;
      display: flex; align-items: center; gap: 8px;
      border-bottom: 1px solid var(--border); background: var(--s1);
    }
    .ai-resp-body {
      flex: 1; overflow-y: auto; padding: 12px 16px;
      font-size: 13.5px; line-height: 1.75; color: var(--text);
      white-space: pre-wrap; word-break: break-word;
      font-family: 'IM Fell English', Georgia, serif;
    }
    .ai-hist-scroll {
      flex: 1; overflow-y: auto; padding: 6px 12px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .command-bar {
      border-top: 1px solid var(--border); background: var(--s1); flex-shrink: 0;
    }
    .cmd-row { padding: 7px 10px; display: flex; flex-direction: column; gap: 6px; }
    .insert-btn {
      padding: 2px 10px; border-radius: 3px; font-size: 10px; letter-spacing: .06em;
      cursor: pointer; border: 1px solid var(--gold-dim); background: rgba(212,168,67,.1);
      color: var(--gold); outline: none; transition: all .12s;
    }
    .insert-btn:hover { background: var(--gold); color: var(--bg); }

    /* ── AI Panel ── */
    .ai-panel {
      width: 400px; min-width: 300px; max-width: 520px;
      display: flex; flex-direction: column; background: var(--s1);
    }
    .ai-hdr {
      height: 38px; flex-shrink: 0; padding: 0 14px;
      display: flex; align-items: center; gap: 8px;
      background: var(--s1); border-bottom: 1px solid var(--border);
    }
    .ai-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }
    .ai-dot.pulse { animation: pulse 1.1s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }
    .ai-dot.offline { background: var(--muted); }

    .quick-bar {
      padding: 8px 10px; border-bottom: 1px solid var(--border);
      display: flex; flex-wrap: wrap; gap: 5px; flex-shrink: 0;
    }
    .qbtn {
      padding: 3px 9px; border-radius: 3px; font-size: 11px;
      cursor: pointer; border: 1px solid var(--border);
      background: var(--s2); color: var(--dim);
      transition: all .12s; outline: none;
    }
    .qbtn:hover { border-color: var(--gold-dim); color: var(--gold); background: var(--s3); }
    .qbtn:disabled { opacity: .3; cursor: not-allowed; }

    .chat-msgs { flex: 1; overflow-y: auto; padding: 14px 24px; display: flex; flex-direction: column; gap: 12px; }
    .msg { display: flex; flex-direction: column; gap: 3px; width: 100%; }
    .msg.user { align-items: flex-end; }
    .msg.ai   { align-items: flex-start; width: 100%; }
    .bubble {
      max-width: 66%; padding: 9px 13px; border-radius: 8px;
      font-size: 12.5px; line-height: 1.65; white-space: pre-wrap; word-break: break-word;
    }
    .msg.user .bubble { background: var(--usr-bg); border: 1px solid var(--border); color: var(--dim); border-radius: 8px 8px 2px 8px; }
    .msg.ai   .bubble {
      background: var(--ai-bg); border: 1px solid var(--border); color: var(--text);
      border-radius: 8px 8px 8px 2px;
      max-width: 100%; width: 100%;
      font-family: 'IM Fell English', Georgia, serif;
      font-size: 15px; line-height: 1.85;
    }
    .msg-meta { display: flex; align-items: center; gap: 6px; }
    .msg-time { font-size: 9px; color: var(--muted); }
    .msg-lock {
      font-size: 9px; padding: 1px 7px; border-radius: 2px;
      cursor: pointer; border: 1px solid var(--border);
      background: var(--s2); color: var(--muted); outline: none;
      opacity: 0; transition: opacity .12s;
    }
    .msg:hover .msg-lock { opacity: 1; }
    .msg-lock:hover { color: var(--gold); border-color: var(--gold-dim); }

    .typing-dots { display: flex; gap: 4px; align-items: center; padding: 2px 0; }
    .typing-dots span {
      width: 5px; height: 5px; background: var(--gold-dim);
      border-radius: 50%; animation: blink 1.3s ease infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,100%{opacity:.15} 50%{opacity:1} }

    .chat-input-area {
      padding: 10px; border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 7px; flex-shrink: 0;
    }
    .mode-row { display: flex; gap: 4px; }
    .mbtn {
      padding: 3px 9px; border-radius: 3px; font-size: 10px;
      cursor: pointer; border: 1px solid var(--border);
      background: var(--s2); color: var(--muted);
      transition: all .12s; outline: none; letter-spacing: .04em;
    }
    .mbtn.on { border-color: var(--gold-dim); color: var(--gold); background: var(--s3); }
    .input-row { display: flex; gap: 7px; align-items: flex-end; }
    .chat-in {
      flex: 1; background: var(--s2); border: 1px solid var(--border);
      border-radius: 5px; padding: 7px 10px; color: var(--text);
      font-size: 12.5px; resize: none; outline: none;
      font-family: inherit; max-height: 100px; line-height: 1.5;
      transition: border-color .13s;
    }
    .chat-in:focus { border-color: var(--gold-dim); }
    .chat-in::placeholder { color: var(--muted); }
    .send-btn {
      width: 34px; height: 34px; border-radius: 5px;
      background: var(--gold-dim); border: 1px solid var(--gold);
      color: var(--gold); cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      font-size: 15px; transition: all .13s; flex-shrink: 0; outline: none;
    }
    .send-btn:hover:not(:disabled) { background: var(--gold); color: var(--bg); }
    .send-btn:disabled { opacity: .3; cursor: not-allowed; }
    .spinner {
      width: 13px; height: 13px; border: 2px solid var(--border2);
      border-top-color: var(--gold); border-radius: 50%;
      animation: spin .65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Mic button ── */
    .mic-btn {
      width: 26px; height: 26px; border-radius: 50%;
      background: transparent; border: 1px solid var(--border);
      color: var(--dim); cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      font-size: 13px; transition: all .13s; outline: none; flex-shrink: 0;
    }
    .mic-btn:hover { border-color: var(--border2); color: var(--text); }
    .mic-btn.on {
      background: rgba(160,40,40,.18); border-color: #b03030; color: #ff7070;
      animation: mic-ring 1.5s ease infinite;
    }
    @keyframes mic-ring {
      0%,100% { box-shadow: 0 0 0 0 rgba(160,40,40,.5); }
      60%      { box-shadow: 0 0 0 5px rgba(160,40,40,0); }
    }
    .interim-bar {
      padding: 3px 16px; font-size: 11px; color: var(--muted);
      font-style: italic; background: var(--s2); border-bottom: 1px solid var(--border);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0;
    }
    .interim-chat {
      font-size: 10px; color: var(--muted); font-style: italic;
      padding: 2px 0 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── Refresh button ── */
    .refresh-btn {
      display: flex; align-items: center; gap: 4px;
      padding: 5px 11px; border-radius: 4px; font-size: 11px;
      letter-spacing: .06em; cursor: pointer; border: 1px solid var(--border);
      background: transparent; color: var(--dim); transition: all .13s; outline: none;
    }
    .refresh-btn:hover { border-color: var(--border2); color: var(--text); }
    .refresh-ico { display: inline-block; transition: transform .35s; }
    .refresh-btn:hover .refresh-ico { transform: rotate(180deg); }

    /* ── Codex Tab ── */
    .codex-tab { height: 100%; display: flex; flex-direction: column; }
    .codex-bar {
      height: 48px; flex-shrink: 0; padding: 0 18px;
      display: flex; align-items: center; gap: 10px;
      background: var(--s1); border-bottom: 1px solid var(--border);
    }
    .codex-title { font-family: 'Cinzel', serif; font-size: 13px; color: var(--gold); letter-spacing: .1em; margin-right: 8px; }
    .sec-btn {
      padding: 4px 13px; border-radius: 4px; font-size: 11px;
      letter-spacing: .06em; cursor: pointer; border: 1px solid var(--border);
      background: transparent; color: var(--dim); transition: all .12s; outline: none;
    }
    .sec-btn.on { border-color: var(--gold-dim); color: var(--gold); background: var(--s3); }
    .codex-grid {
      flex: 1; overflow-y: auto; padding: 18px;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 14px; align-content: start;
    }
    .cx-card {
      background: var(--s2); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px; transition: border-color .13s;
    }
    .cx-card:hover { border-color: var(--border2); }
    .cx-card.locked { border-color: var(--gold-dim); }
    .cx-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; gap: 8px; }
    .cx-name { font-family: 'Cinzel', serif; font-size: 14px; color: var(--gold); letter-spacing: .05em; }
    .cx-badge {
      font-size: 9px; letter-spacing: .1em; color: var(--muted);
      text-transform: uppercase; padding: 2px 7px;
      border: 1px solid var(--border); border-radius: 2px; flex-shrink: 0;
    }
    .cx-field { margin-bottom: 7px; }
    .cx-fl { font-size: 9px; letter-spacing: .1em; color: var(--muted); text-transform: uppercase; margin-bottom: 2px; }
    .cx-fv { font-size: 12px; color: var(--dim); line-height: 1.55; }
    .lock-tag {
      display: inline-block; margin-top: 4px; font-size: 9px;
      padding: 1px 7px; border-radius: 2px;
      background: rgba(201,168,76,.08); border: 1px solid var(--gold-dim); color: var(--gold);
    }
    .cx-actions { display: flex; gap: 6px; margin-top: 11px; }

    /* ── Chapters Tab ── */
    .chapters-tab { height: 100%; display: flex; flex-direction: column; }
    .ch-bar {
      height: 48px; flex-shrink: 0; padding: 0 18px;
      display: flex; align-items: center; gap: 10px;
      background: var(--s1); border-bottom: 1px solid var(--border);
    }
    .ch-list { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 11px; }
    .ch-card { background: var(--s2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .ch-head {
      padding: 13px 16px; display: flex; align-items: center; gap: 11px;
      cursor: pointer; transition: background .13s;
    }
    .ch-head:hover { background: var(--s3); }
    .ch-num { font-family: 'Cinzel', serif; font-size: 10px; color: var(--muted); letter-spacing: .1em; min-width: 30px; }
    .ch-name { font-family: 'Cinzel', serif; font-size: 14px; color: var(--gold); flex: 1; }
    .ch-meta { font-size: 10px; color: var(--muted); }
    .ch-body { padding: 0 16px 14px; border-top: 1px solid var(--border); }
    .ch-preview {
      font-family: 'IM Fell English', Georgia, serif;
      font-size: 13px; color: var(--dim); line-height: 1.75;
      padding: 11px 0; white-space: pre-wrap;
      max-height: 180px; overflow-y: auto;
    }
    .ch-exports { display: flex; gap: 7px; padding-top: 10px; }

    /* ── Modals ── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.8);
      display: flex; align-items: center; justify-content: center; z-index: 200;
    }
    .modal {
      background: var(--s2); border: 1px solid var(--border2);
      border-radius: 10px; padding: 26px; width: 480px; max-width: 92vw; max-height: 90vh; overflow-y: auto;
    }
    .modal-wide { width: 580px; }
    .modal-title { font-family: 'Cinzel', serif; font-size: 17px; color: var(--gold); margin-bottom: 18px; letter-spacing: .08em; }
    .modal-foot { display: flex; justify-content: flex-end; gap: 9px; margin-top: 18px; }
    .fg { margin-bottom: 12px; }
    .fl { display: block; font-size: 9px; letter-spacing: .1em; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
    .fi, .fta, .fsel {
      width: 100%; background: var(--s1); border: 1px solid var(--border);
      border-radius: 4px; padding: 7px 10px; color: var(--text);
      font-size: 12.5px; outline: none; font-family: inherit;
      transition: border-color .13s;
    }
    .fi:focus, .fta:focus, .fsel:focus { border-color: var(--gold-dim); }
    .fta { resize: vertical; min-height: 58px; line-height: 1.55; }
    .fsel option { background: var(--s1); }
    .fi-note { font-size: 10px; color: var(--muted); margin-top: 5px; line-height: 1.5; }

    /* ── Empty states ── */
    .empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 11px; padding: 56px 24px;
      color: var(--muted); grid-column: 1/-1;
    }
    .empty-ico { font-size: 38px; opacity: .25; }
    .empty-txt { font-size: 12px; text-align: center; line-height: 1.7; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
      background: var(--s3); border: 1px solid var(--red); color: var(--redt);
      padding: 8px 16px; border-radius: 5px; font-size: 12px;
      z-index: 300; animation: fiu .18s ease;
      white-space: nowrap;
    }
    .toast.ok { border-color: #2e7c3e; color: #7de89d; }
    @keyframes fiu { from{opacity:0;transform:translateX(-50%) translateY(6px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

    /* ── Lock list in Codex (locked elements panel) ── */
    .lock-list { padding: 16px; display: flex; flex-direction: column; gap: 8px; }
    .lock-item {
      background: var(--s2); border: 1px solid var(--gold-dim);
      border-radius: 5px; padding: 9px 12px;
      display: flex; align-items: flex-start; gap: 10px;
    }
    .lock-item-text { flex: 1; font-size: 12px; color: var(--text); line-height: 1.55; }
    .lock-item-date { font-size: 9px; color: var(--muted); margin-top: 3px; }
    .lock-rm { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 0 2px; }
    .lock-rm:hover { color: var(--redt); }

    /* ── Mobile ── */
    @supports (height: 100dvh) { .app { height: 100dvh; } }

    @media (max-width: 640px) {
      .app { padding-bottom: env(safe-area-inset-bottom, 0px); }

      /* Header wraps on mobile */
      .header {
        height: auto; min-height: 46px;
        flex-wrap: wrap; padding: 5px 8px; gap: 3px 6px;
      }
      .logo { font-size: 13px; flex-shrink: 0; }
      .logo em { display: none; }
      /* Tabs go to their own full-width row */
      .tabs { order: 3; width: 100%; gap: 2px; }
      .tab { flex: 1; text-align: center; padding: 5px 4px; font-size: 11px; letter-spacing: .03em; }
      .hdr-right { margin-left: auto; gap: 4px; }
      .refresh-btn { display: none; }
      .btn { padding: 5px 8px; font-size: 10px; }

      /* Hide verbose status bar */
      .status { display: none; }

      /* Chat messages area */
      .chat-msgs { padding: 10px; gap: 10px; }
      .msg.ai .bubble { font-size: 14px; line-height: 1.7; padding: 10px 12px; }
      .msg.user .bubble { font-size: 12px; max-width: 85%; }

      /* Quick action buttons */
      .quick-bar { padding: 6px; gap: 4px; }
      .qbtn { padding: 6px 10px; font-size: 11px; }

      /* Mode selector */
      .mode-row { flex-wrap: wrap; gap: 4px; }
      .mbtn { padding: 6px 10px; font-size: 11px; flex: 1; text-align: center; min-width: 70px; }

      /* Text input — 16px prevents iOS auto-zoom */
      .chat-input-area { padding: 8px; gap: 6px; }
      .chat-in { font-size: 16px; line-height: 1.45; }
      .send-btn { width: 42px; height: 42px; font-size: 18px; flex-shrink: 0; }
      .mic-btn { width: 36px; height: 36px; font-size: 17px; }

      /* Codex on mobile */
      .codex-bar { flex-wrap: wrap; height: auto; padding: 8px 10px; gap: 5px; }
      .codex-grid { padding: 10px; gap: 10px;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }

      /* Chapters on mobile */
      .ch-bar { flex-wrap: wrap; height: auto; padding: 8px 12px; gap: 5px; }
      .ch-head { padding: 12px; }
      .ch-meta { display: none; }

      /* Modals */
      .modal { padding: 20px 16px; max-width: 95vw; }
    }
  </style>

// ─────────────────────────────────────────────
// CLAUDE API
// ─────────────────────────────────────────────
async function callClaude(apiKey, apiMsgs, storyText, codex, locked, mode, onChunk) {
  const sys = buildSys(storyText, codex, locked, mode);
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: MODEL,
      max_tokens: MAX_TOKENS,
      stream: true,
      system: sys,
      messages: apiMsgs,
    }),
  });

  if (!resp.ok) {
    const e = await resp.json().catch(() => ({}));
    throw new Error(e.error?.message || `HTTP ${resp.status}`);
  }

  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  let full = '';
  let hitMaxTokens = false;

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    for (const line of dec.decode(value, { stream: true }).split('\n')) {
      if (!line.startsWith('data: ')) continue;
      const d = line.slice(6).trim();
      if (d === '[DONE]') continue;
      try {
        const j = JSON.parse(d);
        if (j.type === 'content_block_delta' && j.delta?.type === 'text_delta') {
          full += j.delta.text;
          onChunk(full);
        }
        if (j.type === 'message_delta' && j.delta?.stop_reason === 'max_tokens') { hitMaxTokens = true; }
      } catch {}
    }
  }
  return { text: full, hitMaxTokens };
}

function trimToSentence(text) {
  if (!text || /[.!?…»"']\s*$/.test(text)) return text;
  let lastEnd = -1;
  for (let i = text.length - 1; i >= 0; i--) {
    if ('.!?…»"\''.includes(text[i])) { lastEnd = i; break; }
  }
  return lastEnd > text.length * 0.4 ? text.slice(0, lastEnd + 1) : text;
}

// ─────────────────────────────────────────────
// GEMINI API
// ─────────────────────────────────────────────
async function callGemini(apiKey, apiMsgs, storyText, codex, locked, mode, onChunk) {
  const sys = buildSys(storyText, codex, locked, mode);
  const contents = apiMsgs.map(m => ({
    role: m.role === 'assistant' ? 'model' : 'user',
    parts: [{ text: m.content }]
  }));

  const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:streamGenerateContent?alt=sse&key=${apiKey}`;
  const resp = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      system_instruction: { parts: [{ text: sys }] },
      contents,
      generationConfig: { maxOutputTokens: MAX_TOKENS, temperature: 0.9 }
    })
  });

  if (!resp.ok) {
    const e = await resp.json().catch(() => ({}));
    throw new Error(e.error?.message || `HTTP ${resp.status}`);
  }

  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  let full = '';
  let hitMaxTokens = false;

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    for (const line of dec.decode(value, { stream: true }).split('\n')) {
      if (!line.startsWith('data: ')) continue;
      const d = line.slice(6).trim();
      try {
        const j = JSON.parse(d);
        const text = j.candidates?.[0]?.content?.parts?.[0]?.text;
        if (text) { full += text; onChunk(full); }
        if (j.candidates?.[0]?.finishReason === 'MAX_TOKENS') hitMaxTokens = true;
      } catch {}
    }
  }
  return { text: full, hitMaxTokens };
}

async function callGroq(apiKey, apiMsgs, storyText, codex, locked, mode, onChunk) {
  const sys = buildSys(storyText, codex, locked, mode);
  const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${apiKey}`,
    },
    body: JSON.stringify({
      model: GROQ_MODEL,
      max_tokens: MAX_TOKENS,
      stream: true,
      messages: [{ role: 'system', content: sys }, ...apiMsgs],
    }),
  });

  if (!resp.ok) {
    const e = await resp.json().catch(() => ({}));
    throw new Error(e.error?.message || `HTTP ${resp.status}`);
  }

  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  let full = '';
  let hitMaxTokens = false;

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    for (const line of dec.decode(value, { stream: true }).split('\n')) {
      if (!line.startsWith('data: ')) continue;
      const d = line.slice(6).trim();
      if (d === '[DONE]') continue;
      try {
        const j = JSON.parse(d);
        const text = j.choices?.[0]?.delta?.content;
        if (text) { full += text; onChunk(full); }
        if (j.choices?.[0]?.finish_reason === 'length') hitMaxTokens = true;
      } catch {}
    }
  }
  return { text: full, hitMaxTokens };
}

function exportPDF(chapter) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const W = doc.internal.pageSize.getWidth() - 40;
  const H = doc.internal.pageSize.getHeight();

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(18);
  doc.text(chapter.title, 20, 28);

  doc.setFont('helvetica', 'normal');
  doc.setFontSize(11.5);

  let y = 42;
  for (const line of doc.splitTextToSize(chapter.content, W)) {
    if (y > H - 20) { doc.addPage(); y = 20; }
    doc.text(line, 20, y);
    y += 6.5;
  }
  doc.save(`${chapter.title}.pdf`);
}

  const html = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
<head><meta charset='utf-8'><title>${chapter.title}</title>

</body></html>`;

}

function MicButton({ onFinal, onInterim, onError }) {
  const [active, setActive] = useState(false);
  const recRef = useRef(null);

  const supported = typeof window !== 'undefined' &&
    !!(window.SpeechRecognition || window.webkitSpeechRecognition);

  const toggle = () => {
    if (!supported) {
      onError('A diktálás Chrome böngészőben érhető el.');
      return;
    }
    if (active) {
      recRef.current?.stop();
      recRef.current = null;
      setActive(false);
      onInterim('');
      return;
    }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = new SR();
    rec.lang = 'hu-HU';
    rec.continuous = true;
    rec.interimResults = true;

    rec.onresult = (e) => {
      let fin = '', interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) fin += t;
        else interim += t;
      }
      onInterim(interim);
      if (fin) { onFinal(fin); onInterim(''); }
    };

    rec.onerror = (ev) => {
      onError('Mikrofon hiba: ' + ev.error);
      setActive(false);
      onInterim('');
    };

    rec.onend = () => { setActive(false); onInterim(''); };

    recRef.current = rec;
    rec.start();
    setActive(true);
  };

  return (
    <button
      className={`mic-btn ${active ? 'on' : ''}`}
      onClick={toggle}
      title={active ? 'Diktálás leállítása' : 'Diktálás indítása (hu-HU)'}
    >
      🎙
    </button>
  );
}

function EditorTab({ history, onSend, loading, locked, onLockAdd, onToast }) {

  const [interim, setInterim] = useState('');
  const endRef = useRef(null);
  const inRef  = useRef(null);

  const insertIntoChat = (text) => {
    const el = inRef.current;
    if (!el) { setInput(prev => prev + text); return; }
    const s = el.selectionStart ?? el.value.length;
    const e = el.selectionEnd ?? el.value.length;
    const nv = el.value.slice(0, s) + text + ' ' + el.value.slice(e);
    setInput(nv);
    requestAnimationFrame(() => { el.selectionStart = el.selectionEnd = s + text.length + 1; el.focus(); });
  };

  useEffect(() => { endRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [history, loading]);

  const send = () => {
    if (!input.trim() || loading) return;

function UniverseImportModal({ onImport, onClose }) {
  const [text,    setText]    = useState('');
  const [loading, setLoading] = useState(false);
  const doImport = async () => {
    if (!text.trim()) return;
    setLoading(true);
    const groqKey = localStorage.getItem('tarsiro_groqkey') || 'ZLIzNyd4Ryu1DJW77DWc9ywkYF3bydGWKJdrWrKQ4HfpPv67IxmB_ksg'.split('').reverse().join('');
    const prompt = `Az alábbi szövegből olvasd ki az összes karaktert, helyszínt és lore elemet.
Válaszolj KIZÁRÓLAG érvényes JSON formátumban, semmi más szöveg:
{
  "characters": [{"name":"...","description":"...","motivation":"...","background":"...","voice":"Hogyan beszél, milyen a stílusa, mondatritmus, szóhasználat"}],
  "locations": [{"name":"...","description":"..."}],
  "lore": [{"name":"...","description":"..."}]
}
SZÖVEG:
${text.slice(0, 4000)}`;
    try {
      const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${groqKey}` },
        body: JSON.stringify({ model: 'llama-3.3-70b-versatile', max_tokens: 2048, messages: [{ role:'user', content: prompt }] })
      });
      const data = await resp.json();
      const raw  = data.choices?.[0]?.message?.content || '';
      const jsonMatch = raw.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error('Nem sikerült JSON-t kiolvasni');
      const parsed = JSON.parse(jsonMatch[0]);
      onImport(parsed);
    } catch(e) {
      alert('Hiba az import során: ' + e.message);
    } finally { setLoading(false); }
  };
  return (
    <div className="overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal modal-wide">
        <div className="modal-title">🌍 Univerzum Import</div>
        <div className="fg">
          <label className="fl">Illeszd be a szöveget (wiki, könyvrészlet, saját leírás...)</label>
          <textarea className="fta" rows={12} value={text} onChange={e=>setText(e.target.value)} placeholder="Pl.: One Piece wikiszöveg, Berserk karakterleírás, saját világépítés..."/>

        <div className="fi-note" style={{marginBottom:12}}>Az AI automatikusan kiolvassa a karaktereket, helyszíneket és lore elemeket, és minden karakterhez generál egy hang-profilt.</div>
        <div className="modal-foot">
          <button className="btn btn-ghost" onClick={onClose}>Mégse</button>
          <button className="btn btn-gold" disabled={!text.trim() || loading} onClick={doImport}>
            {loading ? '⏳ Elemzés...' : '🔍 Import és elemzés'}
          </button>
        </div>
      </div>
    </div>
  );
}

  const [loading,  setLoading] = useState(false);
  const [toast,    setToast]   = useState(null);
  const [showAPI,  setShowAPI] = useState(false);
  const [showLock, setShowLock]= useState(false);

  const [history,  setHistory] = useState([]);
  const [codex,    setCodex]   = useState({ characters:[], locations:[], lore:[] });
  const [chapters, setChapters]= useState([]);
  const [locked,   setLocked]  = useState([]);
  const importRef = useRef(null);

  // Persist auto-save
  useEffect(() => {
    const d = load();
    if (d) {
      setHistory(d.history || []);
      setCodex(d.codex || { characters:[], locations:[], lore:[] });
      setChapters(d.chapters || []);
      setLocked(d.locked || []);
    }
    const prov = localStorage.getItem('tarsiro_provider') || 'groq';
    const ckey = localStorage.getItem(KEY_KEY) || '';
    const gkey = localStorage.getItem('tarsiro_geminikey') || '';
    const rkey = localStorage.getItem('tarsiro_groqkey') || '';
    setProvider(prov);
    if (ckey) setApiKey(ckey);
    if (gkey) setGeminiKey(gkey);
    if (rkey) setGroqKey(rkey);
    const activeKey = prov==='gemini' ? gkey : prov==='groq' ? (rkey || DEFAULT_GROQ_KEY) : ckey;
    if (!activeKey) setShowAPI(true);
  }, []);

  useEffect(() => {
    save({ history, codex, chapters, locked });
  }, [history, codex, chapters, locked]);

  const toast$ = (msg, ok=false) => {
    setToast({ msg, ok });
    setTimeout(() => setToast(null), 3400);
  };

  const saveSettings = ({ provider: prov, apiKey: akey, geminiKey: gkey, groqKey: rkey }) => {
    setProvider(prov);
    localStorage.setItem('tarsiro_provider', prov);
    if (akey.trim()) { setApiKey(akey.trim()); localStorage.setItem(KEY_KEY, akey.trim()); }
    if (gkey.trim()) { setGeminiKey(gkey.trim()); localStorage.setItem('tarsiro_geminikey', gkey.trim()); }
    if (rkey.trim()) { setGroqKey(rkey.trim()); localStorage.setItem('tarsiro_groqkey', rkey.trim()); }
    setShowAPI(false);
    const labels = { groq:'🟣 Groq beállítva!', gemini:'🟢 Gemini beállítva!', claude:'🔴 Claude beállítva!' };
    toast$(labels[prov] || 'Beállítva!', true);
  };

  const addLock = text => {
    setLocked(p => [...p, { id:uid(), text, createdAt:Date.now() }]);
    toast$(`🔒 Zárolva`, true);
  };

  const doExport = () => {
    const data = JSON.stringify({ history, codex, chapters, locked }, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `tarsiro-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast$('Adatok exportálva!', true);
  };

  const doImport = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        if (d.history)  setHistory(d.history);
        if (d.codex)    setCodex(d.codex);
        if (d.chapters) setChapters(d.chapters);
        if (d.locked)   setLocked(d.locked);

        // Story összefoglaló a chatbe — hogy az AI tudja hol tartunk
        const aiMessages = (d.history || []).filter(m => m.role === 'ai' && m.content);
        if (aiMessages.length > 0) {
          const lastAiChunks = aiMessages.slice(-3).map(m => m.content).join('\n\n---\n\n');
          const resumeMsg = {
            role: 'user',
            content: `[FOLYTATÁS BETÖLTVE]\n\nAz előző session utolsó részei:\n\n${lastAiChunks.slice(-2000)}\n\n---\nInnen folytatjuk. Ismered a kontextust, tudsz mindent ami eddig történt. Várom az első mondatot vagy kérdést.`,
            ts: Date.now(),
          };
          const systemNote = {
            role: 'ai',
            content: `✅ Session betöltve. Ismerem az előzményeket — ${aiMessages.length} korábbi AI válasz alapján tudom hol tartunk. Folytatjuk ahol abbahagytuk. Mit csinálunk?`,
            ts: Date.now() + 1,
          };
          setHistory(prev => [...(d.history || []), resumeMsg, systemNote]);
        }

        toast$('Session betöltve! Az AI tudja hol tartotok. ✓', true);
      } catch { toast$('Érvénytelen fájl!'); }
      e.target.value = '';
    };
    reader.readAsText(file);
  };

  function storyFromHistory(hist) {
    return hist.filter(m => m.role === 'ai' && m.content)
      .map(m => m.content).join('\n\n').slice(-3000);
  }

  const onSend = async (message, mode) => {
    const activeKey = provider==='gemini' ? geminiKey : provider==='groq' ? (groqKey || DEFAULT_GROQ_KEY) : apiKey;
    if (!activeKey) { setShowAPI(true); return; }
    const userMsg = { role:'user', content:message, ts:Date.now() };
    const withUser = [...history, userMsg];
    const placeholder = { role:'ai', content:'', ts:Date.now() };
    setHistory([...withUser, placeholder]);
    setLoading(true);
    const msgLimit = provider === 'groq' ? 8 : 22;
    const msgMaxChars = provider === 'groq' ? 1200 : 99999;
    const apiMsgs = withUser.slice(-msgLimit).map(m => ({
      role: m.role === 'ai' ? 'assistant' : 'user',
      content: m.content.length > msgMaxChars ? '…' + m.content.slice(-msgMaxChars) : m.content,
    }));
    const callFn = provider==='gemini' ? callGemini : provider==='groq' ? callGroq : callClaude;
    try {
      const result = await callFn(activeKey, apiMsgs, storyFromHistory(withUser), codex, locked, mode, text => {
        setHistory(prev => {
          const u = [...prev];
          u[u.length-1] = { role:'ai', content:text, ts:Date.now() };
          return u;
        });
      });
      let finalText = result.hitMaxTokens ? trimToSentence(result.text) : result.text;
      if (result.hitMaxTokens) {
        const contMsgs = [...apiMsgs, { role:'assistant', content: result.text }, { role:'user', content:'Folytasd pontosan ahol abbahagytad, ugyanabban a stílusban és hangnemben.' }];
        try {
          const cont = await callFn(activeKey, contMsgs, storyFromHistory(withUser), codex, locked, mode, text => {
            setHistory(prev => { const u = [...prev]; u[u.length-1] = { role:'ai', content: finalText + text, ts:Date.now() }; return u; });
          });
          finalText = finalText + cont.text;
        } catch(e) { /* ha a folytatás hibázik, az eredeti marad */ }
        setHistory(prev => { const u = [...prev]; u[u.length-1] = { ...u[u.length-1], content: finalText }; return u; });
      }
    } catch(e) {
      setHistory(withUser);
      toast$(`API hiba: ${e.message}`);
    } finally {
      setLoading(false);
    }
  };

  const codexCount = (codex.characters.length + codex.locations.length + codex.lore.length);

  return (
    <div className="app">
      {/* Header */}
      <header className="header">
        <div className="logo">TÁRSÍRÓ <em>AI TÖRTÉNETÍRÓ</em></div>
        <nav className="tabs">
          {[['editor','Szerkesztő'],['codex','Codex'],['chapters','Fejezetek']].map(([id,label]) => (
            <button key={id} className={`tab ${tab===id?'active':''}`} onClick={()=>setTab(id)}>{label}</button>
          ))}
        </nav>
        <div className="hdr-right">
          <button className="refresh-btn" onClick={() => window.location.reload(true)}>
            <span className="refresh-ico">↻</span> Frissítés
          </button>
          <button className="btn btn-ghost" onClick={doExport} title="Adatok mentése fájlba">📤 Export</button>
          <button className="btn btn-ghost" onClick={() => importRef.current?.click()} title="Adatok betöltése fájlból">📥 Import</button>
          <input ref={importRef} type="file" accept=".json" style={{display:'none'}} onChange={doImport}/>
          {locked.length > 0 && (
            <span style={{fontSize:10,color:'var(--gold)',opacity:.8,letterSpacing:'.06em'}}>
              🔒 {locked.length}
            </span>
          )}
          <button className="btn btn-ghost" onClick={()=>setShowLock(true)}>🔒 Zárolás</button>
          <button className="btn btn-ghost" onClick={()=>setShowAPI(true)}
            style={!(provider==='gemini'?geminiKey:provider==='groq'?groqKey:apiKey)?{borderColor:'#8b4a1a',color:'#e09050'}:{}}>
            {provider==='groq'   ? (groqKey   ? '🟣 Groq'   : '⚠ API kulcs')
            :provider==='gemini' ? (geminiKey ? '🟢 Gemini' : '⚠ API kulcs')
            :                      (apiKey    ? '🔴 Claude' : '⚠ API kulcs')}
          </button>
        </div>
      </header>

      {/* Content */}
      <main className="content">
        {tab === 'editor' && (
          <EditorTab history={history}
            onSend={onSend} loading={loading} locked={locked} onLockAdd={addLock} onToast={toast$}/>
        )}
        {tab === 'codex' && (
          <CodexTab codex={codex} setCodex={setCodex} locked={locked} setLocked={setLocked}/>
        )}
        {tab === 'chapters' && (
          <ChaptersTab chapters={chapters} setChapters={setChapters} story=""/>
        )}
      </main>

      {/* Status bar */}
      <div className="status">
        <span>TÁRSÍRÓ v1.0</span>
        <span>·</span>
        <span>{words(history.filter(m=>m.role==='ai').map(m=>m.content).join(' ')).toLocaleString('hu-HU')} szó</span>
        <span>·</span>
        <span>{chapters.length} fejezet</span>
        <span>·</span>
        <span>{codexCount} codex elem</span>
        <span>·</span>
        <span>{locked.length} zárolás</span>
        <span style={{marginLeft:'auto'}}>
          <span className="status-dot" style={{background: apiKey ? 'var(--gold)' : 'var(--muted)'}}/>
          {apiKey ? 'Kapcsolódva' : 'Nincs API kulcs'}
        </span>
      </div>

      {/* Modals */}
      {showAPI  && <SettingsModal provider={provider} apiKey={apiKey} geminiKey={geminiKey} groqKey={groqKey} onSave={saveSettings} onClose={()=>setShowAPI(false)}/>}
      {showLock && <LockModal onLock={t=>{ addLock(t); setShowLock(false); }} onClose={()=>setShowLock(false)}/>}

      {/* Toast */}
      {toast && <Toast msg={toast.msg} ok={toast.ok} onDone={()=>setToast(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
